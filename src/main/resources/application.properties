# ================================
# SaaS AI Backend - Configuration
# ================================

spring.application.name=saas-ai-backend
server.port=8080

# ================================
# Base de données (H2 - DEV)
# ================================
spring.datasource.url=jdbc:h2:mem:saasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================
# Pour PostgreSQL (PROD) - décommenter
# ================================
#spring.datasource.url=jdbc:postgresql://localhost:5432/saasdb
#spring.datasource.username=postgres
#spring.datasource.password=yourpassword
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update

# ================================
# IA - Configuration
# ================================
ai.provider=openai
ai.openai.api-key=YOUR_OPENAI_API_KEY
ai.openai.model=gpt-3.5-turbo
ai.openai.base-url=https://api.openai.com/v1

# ================================
# Sécurité API Key
# ================================
security.api-key.header=X-API-Key
security.api-key.enabled=true

# ================================
# CORS
# ================================
cors.allowed-origins=http://localhost:3000,http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*

# ================================
# Logs
# ================================
logging.level.com.saas=DEBUG
logging.level.org.springframework.security=INFO
